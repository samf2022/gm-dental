      // root's never-relay rule) are what hold in fully opaque chains

      ';</' + 'script>';

    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.

      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;

      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');

        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

border:1px solid rgba(var(--ink-rgb),.16);border-radius:999px;outline:none\">\n      <\/div>\n\n      <!-- Filtros -->\n      <div ref=\"{{ filterRef }}\" style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:40px\">\n        <sc-for list=\"{{ specialties }}\" as=\"s\" hint-placeholder-count=\"7\">\n          <button data-spec=\"{{ s }}\" sc-camel-on-click=\"{{ onFilter }}\" style=\"font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:11px 20px;border-radius:999px;border:1px solid rgba(var(--ink-rgb),.2);cursor:pointer;transition:all .2s ease\">{{ s }}<\/button>\n        <\/sc-for>\n      <\/div>\n\n      <!-- Grid tarjetas -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:20px\">\n        <sc-for list=\"{{ filteredServices }}\" as=\"svc\" hint-placeholder-count=\"6\">\n          <article style=\"background:var(--bg);border:1px solid rgba(var(--ink-rgb),.08);border-radius:16px;padding:30px 26px;display:flex;flex-direction:column;animation:floatUp .4s ease both\">\n            <span style=\"font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:16px\">{{ svc.s }}<\/span>\n            <h3 style=\"font-family:'Montserrat',sans-serif;font-size:15px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin-bottom:12px;line-height:1.35\">{{ svc.n }}<\/h3>\n            <p style=\"font-size:17px;font-weight:300;line-height:1.5;color:var(--muted2);margin-bottom:22px;flex:1;text-wrap:pretty\">{{ svc.d }}<\/p>\n            <button data-spec=\"{{ svc.s }}\" data-name=\"{{ svc.n }}\" sc-camel-on-click=\"{{ onCardAgendar }}\" style=\"align-self:flex-start;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);background:transparent;border:none;border-bottom:1px solid var(--gold);padding:4px 0;cursor:pointer\">Agendar este servicio →<\/button>\n          <\/article>\n        <\/sc-for>\n      <\/div>\n      <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"text-align:center;font-size:19px;font-weight:300;color:var(--muted);padding:40px 0\">No encontramos ese servicio. <a href=\"{{ waSearchLink }}\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--gold-deep);border-bottom:1px solid var(--gold)\">Escríbenos por WhatsApp<\/a> y te orientamos.<\/p>\n      <\/sc-if>\n    <\/div>\n  <\/section>\n\n  <!-- ============ COMPARADOR ANTES/DESPUÉS ============ -->\n  <sc-if value=\"{{ showComparator }}\" hint-placeholder-val=\"{{ true }}\">\n  <section id=\"resultados\" style=\"scroll-margin-top:90px;padding:100px 24px\">\n    <div style=\"max-width:900px;margin:0 auto;text-align:center\">\n      <p data-reveal=\"\" style=\"font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:12px\">Casos de estética<\/p>\n      <h2 data-reveal=\"\" style=\"font-family:'Pinyon Script',cursive;font-weight:400;font-size:clamp(40px,6vw,68px);line-height:1;color:var(--ink);margin-bottom:14px\">Antes &amp; después<\/h2>\n      <p data-reveal=\"\" style=\"font-size:19px;font-weight:300;color:var(--muted);max-width:520px;margin:0 auto 42px\">Arrastra el control para descubrir el resultado. Resultados tangibles, no historias.<\/p>\n\n      <div ref=\"{{ baRef }}\" style=\"position:relative;width:100%;aspect-ratio:16/10;border-radius:18px;overflow:hidden;user-select:none;touch-action:pan-y;box-shadow:0 30px 60px -30px rgba(var(--ink-rgb),.4);cursor:ew-resize\">\n        <!-- Después (fondo) -->\n        <img src=\"img/despues.jpg\" alt=\"Después — Restauración por caries\" ref=\"{{ afterImgRef }}\" loading=\"lazy\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\">\n        <span style=\"position:absolute;top:18px;right:18px;z-index: equiera.'},\n      {n:'Controles periodontales',s:'Periodoncia',d:'Seguimiento pre y post para pacientes con enfermedad periodontal.'},\n      {n:'Blanqueamiento',s:'Estética',d:'Aclaramiento profesional para una sonrisa varios tonos más luminosa.'},\n      {n:'Carillas de resina',s:'Estética',d:'Rediseño de sonrisa capa a capa, natural y a tu medida.'},\n      {n:'Bordes incisales',s:'Estética',d:'Reconstrucción estética del borde del diente para una sonrisa armónica.'},\n      {n:'Gingivoplastia',s:'Estética',d:'Armonización del contorno de la encía para una sonrisa equilibrada.'},\n      {n:'Endodoncia',s:'Endodoncia',d:'Tratamiento de conductos monorradicular, birradicular y multirradicular.'},\n      {n:'Pulpectomía',s:'Endodoncia',d:'Remoción de la pulpa dental para eliminar el dolor y conservar la pieza.'},\n      {n:'Pulpotomía',s:'Endodoncia',d:'Tratamiento conservador de la cámara pulpar.'},\n      {n:'Cirugía oral',s:'Cirugía',d:'Extracciones y cirugía oral con protocolos seguros y cómodos.'},\n      {n:'Prótesis Valplast',s:'Prótesis',d:'Prótesis total y parcial removible Valplast: flexible, estética y sin metal.'},\n      {n:'Prótesis fija',s:'Prótesis',d:'Coronas y puentes en zirconio y porcelana de máxima estética.'},\n      {n:'Incrustaciones inlay/onlay',s:'Prótesis',d:'Restauraciones precisas y duraderas adheridas a tu diente.'},\n      {n:'Provisionales',s:'Prótesis',d:'Confección y diseño de provisionales mientras completas tu tratamiento.'}\n    ];\n    this.SPECIALTIES = ['Todos','Operatoria','Periodoncia','Estética','Endodoncia','Cirugía','Prótesis'];\n    this.CASES = [\n      {a:'img/antes.jpg', d:'img/despues.jpg', t:'Restauración por caries'},\n      {a:'img/caso2-antes.jpg', d:'img/caso2-despues.jpg', t:'Reconstrucción de frontales'}\n    ];\n\n    const def = this.props.defaultFilter || 'Todos';\n    this.state = {\n      isMobile:false, menuOpen:false, caseIndex:0, timePref:'Por la mañana', fechaError:'', waUrl:'', submitting:false, pickedService:'',\n      search:'', activeSpecialty: this.SPECIALTIES.includes(def)?def:'Todos'\n    };\n  }\n\n  componentDidMount(){\n    document.documentElement.classList.add('dc-mounted');\n    this._onResize = () => {\n      const m = window.innerWidth < 860;\n      if (m !== this.state.isMobile) this.setState({isMobile:m, menuOpen:false});\n    };\n    this._onResize();\n    window.addEventListener('resize', this._onResize);\n\n    // Reveal on scroll (imperative -> survives re-renders)\n    const root = this.rootRef.current;\n    if (root){\n      const nodes = root.querySelectorAll('[data-reveal]');\n      nodes.forEach(n=>{ n.style.opacity='0'; n.style.transform='translateY(22px)'; n.style.transition='opacity .8s ease, transform .8s ease'; });\n      const reveal = (n)=>{ n.style.opacity='1'; n.style.transform='none'; };\n      const inView = (n)=>{ const r=n.getBoundingClientRect(); return r.top < (window.innerHeight||0) - 40 && r.bottom > 0; };\n      // Reveal anything already in view immediately (never trap above-the-fold content hidden)\n      nodes.forEach(n=>{ if(inView(n)) reveal(n); });\n      if ('IntersectionObserver' in window){\n        this._io = new IntersectionObserver((entries)=>{\n          entries.forEach(e=>{ if(e.isIntersecting){ reveal(e.target); this._io.unobserve(e.target); } });\n        }, {threshold:.12});\n        nodes.forEach(n=>{ if(n.style.opacity!=='1') this._io.observe(n); });\n      }\n      // Safety net: if the observer never fires, reveal everything so nothing stays hidden\n      this._revealFallback = setTimeout(()=>{ nodes.forEach(n=>{ if(n.style.opacity!=='1') reveal(n); }); }, 900);\n    }\n\n    this._initFilterStyles();\n    this._initComparator();\n    this._initDatePicker();\n    this._initTema();\n\n    // ocultar el botón flotante mientras el agendador está en pantalla (en móvil tapa los campos)\n    if ('IntersectionObserver' in window && this.schedRef.current){\n      this._floatIO = new IntersectionObserver((es)=>{\n        const el = this.waFloatRef.current; if(!el) return;\n        const hide = es[0].isIntersecting;\n        el.style.opacity = hide ? '0' : '1';\n        el.style.pointerEvents = hide ? 'none' : 'auto';\n      }, {threshold:.15});\n      this._floatIO.observe(this.schedRef.current);\n    }\n  }\n\n  componentDidUpdate(){ this._initFilterStyles(); }\n\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._onResize);\n    if (this._io) this._io.disconnect();\n    if (this._revealFallback) clearTimeout(this._revealFallback);\n    if (this._fp) this._fp.destroy();\n    if (this._floatIO) this._floatIO.disconnect();\n    if (this._baCleanup) this._baCleanup();\n    if (this._temaBox) this._temaBox.remove();\n    if (this._submitReset) clearTimeout(this._submitReset);\n  }\n\n  _initFilterStyles(){\n    const box = this.filterRef.current; if(!box) return;\n    box.querySelectorAll('[data-spec]').forEach(b=>{\n      const active = b.dataset.spec === this.state.activeSpecialty;\n      b.style.background = active ? 'var(--ink)' : 'transparent';\n      b.style.color = active ? 'var(--bg)' : 'var(--ink)';\n      b.style.borderColor = active ? 'var(--ink)' : 'rgba(var(--ink-rgb),.2)';\n    });\n  }\n\n  _initComparator(){\n    const wrap = this.baRef.current; if(!wrap) return;\n    const inner = this.baOverlay.current ? this.baOverlay.current.firstElementChild : null;\n    const syncW = () => { if (inner) inner.style.width = wrap.getBoundingClientRect().width + 'px'; };\n    syncW();\n    window.addEventListener('resize', syncW);\n    const setPos = (clientX)=>{\n      const r = wrap.getBoundingClientRect();\n      let p = (clientX - r.left) / r.width;\n      p = Math.max(0, Math.min(1, p));\n      const pct = (p*100).toFixed(1) + '%';\n      if (this.baOverlay.current) this.baOverlay.current.style.width = pct;\n      if (this.baHandle.current) this.baHandle.current.style.left = pct;\n    };\n    let dragging = false;\n    const down = (e)=>{ dr
